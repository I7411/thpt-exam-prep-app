name: thpt_exam_prep_app
description: "EzExam_app - A Flutter mobile app for Grade 12 students to prepare for the Vietnamese THPT graduation exam."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.0.0

  # HTTP
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.3.1
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  audioplayers: ^6.1.0

  # Utility
  intl: ^0.19.0
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# Cấu hình icon app - Đã sửa lỗi khuôn trắng trên Android máy ảo
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_ezexam.jpg" # Icon mặc định cho các dòng máy cũ

  # Cấu hình Adaptive Icon xóa bỏ hoàn toàn viền trắng trên Android mới
  adaptive_icon_background: "#2059df" # Màu nền xanh/tím đồng bộ với giao diện app
  adaptive_icon_foreground: "assets/images/logo_ezexam.jpg" # Ảnh logo chính đặt lên trên

# Cấu hình tài nguyên hệ thống - Phải viết sát lề trái, KHÔNG thụt lề
flutter:
  uses-material-design: true

  # Khai báo đường dẫn để hiển thị ảnh trong ứng dụng
  assets:
    - assets/images/logo_ezexam.jpg
    - assets/audios/
